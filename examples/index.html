<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>教育短视频 SDK - 演示 Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
      padding: 20px;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #4A90E2 0%, #7B68EE 100%);
      color: #fff;
      padding: 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .header p {
      font-size: 12px;
      opacity: 0.8;
    }

    .tabs {
      display: flex;
      background: #f9f9f9;
      border-bottom: 1px solid #eee;
    }

    .tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
      color: #666;
      position: relative;
    }

    .tab.active {
      color: #4A90E2;
      font-weight: 500;
    }

    .tab.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 2px;
      background: #4A90E2;
      border-radius: 1px;
    }

    .content {
      padding: 20px;
      min-height: 400px;
    }

    .section {
      display: none;
    }

    .section.active {
      display: block;
    }

    .section-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #333;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 10px;
    }

    .btn-primary {
      background: #4A90E2;
      color: #fff;
    }

    .btn-primary:hover {
      background: #3A7BD2;
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .btn-danger {
      background: #FF6B6B;
      color: #fff;
    }

    .btn-small {
      padding: 8px 16px;
      font-size: 12px;
      display: inline-block;
      width: auto;
      margin: 4px;
    }

    .video-container {
      width: 100%;
      aspect-ratio: 9/16;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 16px;
      position: relative;
    }

    .video-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .recording-controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-top: 16px;
    }

    .record-btn {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: 4px solid #fff;
      background: #FF6B6B;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
    }

    .record-btn.recording {
      background: #fff;
      border-color: #FF6B6B;
    }

    .record-btn.recording::before {
      content: '';
      display: block;
      width: 24px;
      height: 24px;
      background: #FF6B6B;
      border-radius: 4px;
      margin: 0 auto;
    }

    .duration-display {
      text-align: center;
      font-size: 24px;
      font-weight: 600;
      font-family: 'Courier New', monospace;
      margin: 10px 0;
      color: #333;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: #eee;
      border-radius: 3px;
      overflow: hidden;
      margin: 10px 0;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #4A90E2, #7B68EE);
      transition: width 0.3s;
    }

    .info-card {
      background: #f9f9f9;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
      font-size: 13px;
      color: #666;
    }

    .info-card strong {
      color: #333;
    }

    .input-group {
      margin-bottom: 16px;
    }

    .input-group label {
      display: block;
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
    }

    .input-group input,
    .input-group textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    .input-group input:focus,
    .input-group textarea:focus {
      outline: none;
      border-color: #4A90E2;
    }

    .quality-selector {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .quality-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid #ddd;
      background: #fff;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .quality-btn.active {
      background: #4A90E2;
      color: #fff;
      border-color: #4A90E2;
    }

    .draft-list {
      max-height: 300px;
      overflow-y: auto;
    }

    .draft-item {
      display: flex;
      align-items: center;
      padding: 10px;
      background: #f9f9f9;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .draft-thumb {
      width: 60px;
      height: 80px;
      background: #ddd;
      border-radius: 6px;
      margin-right: 12px;
      object-fit: cover;
    }

    .draft-info {
      flex: 1;
      font-size: 13px;
    }

    .draft-info .title {
      font-weight: 500;
      color: #333;
      margin-bottom: 4px;
    }

    .draft-info .meta {
      color: #999;
      font-size: 11px;
    }

    .comment-list {
      max-height: 300px;
      overflow-y: auto;
    }

    .comment-item {
      display: flex;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .comment-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #4A90E2;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 500;
      margin-right: 10px;
      flex-shrink: 0;
    }

    .comment-content {
      flex: 1;
    }

    .comment-user {
      font-size: 13px;
      font-weight: 500;
      color: #333;
      margin-bottom: 4px;
    }

    .comment-text {
      font-size: 13px;
      color: #666;
      line-height: 1.4;
    }

    .comment-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 6px;
      font-size: 11px;
      color: #999;
    }

    .comment-like {
      cursor: pointer;
    }

    .comment-like.liked {
      color: #FF6B6B;
    }

    .event-log {
      background: #1e1e1e;
      color: #0f0;
      padding: 12px;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      max-height: 200px;
      overflow-y: auto;
      line-height: 1.5;
    }

    .event-log .event-time {
      color: #888;
    }

    .action-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    .action-row .btn {
      flex: 1;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
    }

    .status-badge.success {
      background: #E8F5E9;
      color: #4CAF50;
    }

    .status-badge.warning {
      background: #FFF3E0;
      color: #FF9800;
    }

    .status-badge.error {
      background: #FFEBEE;
      color: #F44336;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>教育短视频 SDK</h1>
      <p>轻量视频发布与观看能力 · v1.0.0</p>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="recorder">录制</div>
      <div class="tab" data-tab="player">播放</div>
      <div class="tab" data-tab="comments">评论</div>
      <div class="tab" data-tab="events">回调</div>
    </div>

    <div class="content">
      <!-- 录制模块 -->
      <div class="section active" id="section-recorder">
        <div class="section-title">视频录制</div>
        
        <div class="video-container" id="recorder-container"></div>
        
        <div class="duration-display" id="recording-duration">00:00</div>
        
        <div class="recording-controls">
          <button class="btn btn-small btn-secondary" id="btn-switch-camera">切换镜头</button>
          <button class="record-btn" id="btn-record"></button>
          <button class="btn btn-small btn-secondary" id="btn-take-photo">拍照</button>
        </div>

        <div class="action-row" style="margin-top: 20px;">
          <button class="btn btn-secondary btn-small" id="btn-select-video">选择视频</button>
          <button class="btn btn-secondary btn-small" id="btn-save-draft">保存草稿</button>
        </div>

        <div class="input-group">
          <label>最长录制时长 (秒)</label>
          <input type="number" id="max-duration" value="60" min="5" max="600">
        </div>

        <div class="input-group">
          <label>水印文字</label>
          <input type="text" id="watermark-text" placeholder="例如：教育学院" value="教育学院">
        </div>

        <div class="info-card">
          <strong>录制状态：</strong>
          <span class="status-badge" id="record-status">未开始</span>
        </div>
      </div>

      <!-- 播放模块 -->
      <div class="section" id="section-player">
        <div class="section-title">视频播放</div>
        
        <div class="video-container" id="player-container"></div>
        
        <div class="action-row">
          <button class="btn btn-primary btn-small" id="btn-play">播放</button>
          <button class="btn btn-secondary btn-small" id="btn-pause">暂停</button>
          <button class="btn btn-secondary btn-small" id="btn-mute">静音</button>
        </div>

        <div class="progress-bar">
          <div class="progress-bar-fill" id="play-progress" style="width: 0%"></div>
        </div>

        <div class="info-card">
          <strong>进度：</strong><span id="play-time">00:00 / 00:00</span>
        </div>

        <div class="section-title" style="margin-top: 20px;">清晰度</div>
        <div class="quality-selector" id="quality-selector">
          <button class="quality-btn active" data-quality="auto">自动</button>
          <button class="quality-btn" data-quality="360p">360P</button>
          <button class="quality-btn" data-quality="720p">720P</button>
          <button class="quality-btn" data-quality="1080p">1080P</button>
        </div>

        <div class="section-title">互动</div>
        <div class="action-row">
          <button class="btn btn-secondary btn-small" id="btn-like">点赞 <span id="like-count">0</span></button>
          <button class="btn btn-secondary btn-small" id="btn-favorite">收藏 <span id="favorite-count">0</span></button>
          <button class="btn btn-secondary btn-small" id="btn-fullscreen">全屏</button>
        </div>

        <div class="input-group">
          <label>视频链接</label>
          <input type="text" id="video-url" placeholder="输入视频URL" value="https://www.w3schools.com/html/mov_bbb.mp4">
        </div>
        <button class="btn btn-primary" id="btn-load-video">加载视频</button>
      </div>

      <!-- 评论模块 -->
      <div class="section" id="section-comments">
        <div class="section-title">评论管理</div>
        
        <div class="input-group">
          <input type="text" id="comment-input" placeholder="发表评论...">
        </div>
        <button class="btn btn-primary btn-small" id="btn-add-comment" style="margin-bottom: 20px;">发送评论</button>

        <div class="comment-list" id="comment-list">
          <div class="comment-item">
            <div class="comment-avatar">李</div>
            <div class="comment-content">
              <div class="comment-user">李老师</div>
              <div class="comment-text">这个视频讲得非常好，学到了很多！</div>
              <div class="comment-meta">
                <span>2小时前</span>
                <span class="comment-like" data-comment="1">👍 <span class="like-count">12</span></span>
                <span>举报</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 事件回调模块 -->
      <div class="section" id="section-events">
        <div class="section-title">事件回调日志</div>
        
        <button class="btn btn-secondary btn-small" id="btn-clear-log">清空日志</button>
        
        <div class="event-log" id="event-log" style="margin-top: 10px;">
          <div><span class="event-time">[00:00:00]</span> SDK 初始化完成</div>
        </div>

        <div class="section-title" style="margin-top: 20px;">草稿箱</div>
        <button class="btn btn-secondary btn-small" id="btn-refresh-drafts">刷新草稿</button>
        <div class="draft-list" id="draft-list" style="margin-top: 10px;">
          <div style="text-align: center; color: #999; padding: 20px;">暂无草稿</div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import EduShortVideoSDK from '../src/index.ts';

    const sdk = new EduShortVideoSDK({
      appId: 'demo-app-123',
      theme: {
        primaryColor: '#4A90E2',
        secondaryColor: '#7B68EE'
      },
      uploadConfig: {
        uploadUrl: ''
      },
      entryTexts: {
        recorder: '录制视频',
        uploader: '上传视频',
        player: '播放视频',
        comments: '评论'
      }
    });

    await sdk.init();

    function logEvent(message) {
      const logContainer = document.getElementById('event-log');
      const time = new Date().toLocaleTimeString();
      const div = document.createElement('div');
      div.innerHTML = `<span class="event-time">[${time}]</span> ${message}`;
      logContainer.appendChild(div);
      logContainer.scrollTop = logContainer.scrollHeight;
    }

    sdk.on('ready', () => logEvent('✅ SDK 就绪'));
    sdk.on('recordingStart', (data) => logEvent(`🎬 开始录制`));
    sdk.on('recordingStop', (data) => logEvent(`⏹️ 停止录制，时长: ${data.duration.toFixed(1)}s`));
    sdk.on('recordingComplete', (data) => logEvent(`✅ 录制完成，大小: ${sdk.utils.formatFileSize(data.size)}`));
    sdk.on('playStart', (data) => logEvent(`▶️ 开始播放: ${data.videoId}`));
    sdk.on('playEnd', (data) => logEvent(`⏯️ 播放完成，时长: ${data.duration.toFixed(1)}s`));
    sdk.on('playProgress', (data) => {
      document.getElementById('play-progress').style.width = data.percent + '%';
      document.getElementById('play-time').textContent = 
        `${sdk.utils.formatDuration(data.currentTime)} / ${sdk.utils.formatDuration(data.duration)}`;
    });
    sdk.on('like', (data) => {
      document.getElementById('like-count').textContent = data.count;
      logEvent(`👍 点赞，数量: ${data.count}`);
    });
    sdk.on('favorite', (data) => {
      document.getElementById('favorite-count').textContent = data.count;
      logEvent(`⭐ 收藏，数量: ${data.count}`);
    });
    sdk.on('commentAdd', (data) => logEvent(`💬 新增评论: ${data.content.substring(0, 20)}...`));
    sdk.on('uploadProgress', (data) => logEvent(`📤 上传进度: ${data.percent}%`));
    sdk.on('uploadComplete', (data) => logEvent(`✅ 上传完成: ${data.videoId}`));
    sdk.on('draftSave', (data) => logEvent(`📝 保存草稿: ${data.title}`));

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        const tabName = tab.dataset.tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(`section-${tabName}`).classList.add('active');
      });
    });

    const recorderContainer = document.getElementById('recorder-container');
    const recordBtn = document.getElementById('btn-record');
    const durationDisplay = document.getElementById('recording-duration');
    const recordStatus = document.getElementById('record-status');

    async function initRecorder() {
      try {
        await sdk.initRecorder(recorderContainer);
        recordStatus.textContent = '已就绪';
        recordStatus.className = 'status-badge success';
        logEvent('📷 摄像头初始化成功');
      } catch (e) {
        recordStatus.textContent = '初始化失败';
        recordStatus.className = 'status-badge error';
        logEvent(`❌ 摄像头初始化失败: ${e.message}`);
      }
    }

    initRecorder();

    let isRecording = false;

    recordBtn.addEventListener('click', async () => {
      const maxDuration = parseInt(document.getElementById('max-duration').value) || 60;
      sdk.setMaxRecordDuration(maxDuration);

      if (!isRecording) {
        try {
          sdk.startRecording();
          isRecording = true;
          recordBtn.classList.add('recording');
          recordStatus.textContent = '录制中';
          recordStatus.className = 'status-badge warning';

          const updateDuration = () => {
            if (isRecording) {
              const duration = sdk.getCurrentRecordDuration();
              durationDisplay.textContent = sdk.utils.formatDuration(duration);
              requestAnimationFrame(updateDuration);
            }
          };
          updateDuration();
        } catch (e) {
          logEvent(`❌ 开始录制失败: ${e.message}`);
        }
      } else {
        try {
          const result = await sdk.stopRecording();
          isRecording = false;
          recordBtn.classList.remove('recording');
          recordStatus.textContent = '已完成';
          recordStatus.className = 'status-badge success';
          durationDisplay.textContent = sdk.utils.formatDuration(result.duration);
          logEvent(`✅ 录制完成: ${sdk.utils.formatFileSize(result.size)}`);
        } catch (e) {
          logEvent(`❌ 停止录制失败: ${e.message}`);
        }
      }
    });

    document.getElementById('btn-switch-camera').addEventListener('click', async () => {
      try {
        await sdk.switchCamera();
        logEvent('📷 切换摄像头');
      } catch (e) {
        logEvent(`❌ 切换失败: ${e.message}`);
      }
    });

    document.getElementById('btn-take-photo').addEventListener('click', async () => {
      try {
        const photo = await sdk.takePhoto();
        logEvent('📸 拍照成功');
      } catch (e) {
        logEvent(`❌ 拍照失败: ${e.message}`);
      }
    });

    document.getElementById('btn-select-video').addEventListener('click', async () => {
      try {
        const videos = await sdk.selectVideo();
        logEvent(`🎞️ 选择了 ${videos.length} 个视频`);
      } catch (e) {
        logEvent(`❌ 选择失败: ${e.message}`);
      }
    });

    document.getElementById('btn-save-draft').addEventListener('click', async () => {
      try {
        const draft = await sdk.saveDraft({
          title: '草稿视频',
          videoFile: null,
          columnId: 'course-001',
          watermarkConfig: {
            text: document.getElementById('watermark-text').value,
            position: 'bottomRight'
          }
        });
        logEvent(`📝 保存草稿成功: ${draft.draftId}`);
        refreshDrafts();
      } catch (e) {
        logEvent(`❌ 保存草稿失败: ${e.message}`);
      }
    });

    const playerContainer = document.getElementById('player-container');
    sdk.initPlayer(playerContainer);

    document.getElementById('btn-load-video').addEventListener('click', async () => {
      const url = document.getElementById('video-url').value;
      try {
        await sdk.loadVideoStream(url, {
          videoId: 'demo-video-001',
          title: '演示视频',
          qualities: [
            { quality: 'auto', label: '自动', url },
            { quality: '360p', label: '流畅 360P', url },
            { quality: '720p', label: '高清 720P', url },
            { quality: '1080p', label: '超清 1080P', url }
          ]
        });
        logEvent('🎬 视频加载完成');
      } catch (e) {
        logEvent(`❌ 视频加载失败: ${e.message}`);
      }
    });

    document.getElementById('btn-play').addEventListener('click', () => {
      sdk.play();
    });

    document.getElementById('btn-pause').addEventListener('click', () => {
      sdk.pause();
    });

    document.getElementById('btn-mute').addEventListener('click', (e) => {
      const isMuted = sdk.toggleMute();
      e.target.textContent = isMuted ? '取消静音' : '静音';
    });

    document.getElementById('btn-like').addEventListener('click', () => {
      sdk.toggleLike();
    });

    document.getElementById('btn-favorite').addEventListener('click', () => {
      sdk.toggleFavorite();
    });

    document.getElementById('btn-fullscreen').addEventListener('click', () => {
      sdk.toggleFullscreen();
    });

    document.querySelectorAll('.quality-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const quality = btn.dataset.quality;
        const success = sdk.setQuality(quality);
        if (success) {
          document.querySelectorAll('.quality-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          logEvent(`📺 切换清晰度: ${quality}`);
        }
      });
    });

    document.getElementById('btn-add-comment').addEventListener('click', async () => {
      const input = document.getElementById('comment-input');
      const content = input.value.trim();
      if (!content) return;

      const user = {
        userId: 'user-001',
        nickname: '我',
        token: 'mock-token'
      };

      try {
        const comment = await sdk.addComment('demo-video-001', content, user);
        input.value = '';
        
        const commentList = document.getElementById('comment-list');
        const commentEl = document.createElement('div');
        commentEl.className = 'comment-item';
        commentEl.innerHTML = `
          <div class="comment-avatar">我</div>
          <div class="comment-content">
            <div class="comment-user">我</div>
            <div class="comment-text">${content}</div>
            <div class="comment-meta">
              <span>刚刚</span>
              <span class="comment-like">👍 <span class="like-count">0</span></span>
              <span>举报</span>
            </div>
          </div>
        `;
        commentList.insertBefore(commentEl, commentList.firstChild);
      } catch (e) {
        logEvent(`❌ 评论失败: ${e.message}`);
      }
    });

    document.getElementById('btn-clear-log').addEventListener('click', () => {
      document.getElementById('event-log').innerHTML = '';
    });

    document.getElementById('btn-refresh-drafts').addEventListener('click', refreshDrafts);

    function refreshDrafts() {
      const drafts = sdk.getDrafts();
      const draftList = document.getElementById('draft-list');
      
      if (drafts.length === 0) {
        draftList.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">暂无草稿</div>';
        return;
      }

      draftList.innerHTML = drafts.map(draft => `
        <div class="draft-item">
          <div class="draft-thumb"></div>
          <div class="draft-info">
            <div class="title">${draft.title}</div>
            <div class="meta">${new Date(draft.updatedAt).toLocaleString()}</div>
            <div class="meta">栏目: ${draft.columnId || '未分类'}</div>
          </div>
          <button class="btn btn-danger btn-small" onclick="deleteDraft('${draft.draftId}')">删除</button>
        </div>
      `).join('');
    }

    window.deleteDraft = (draftId) => {
      sdk.deleteDraft(draftId);
      refreshDrafts();
      logEvent(`🗑️ 删除草稿: ${draftId}`);
    };

    sdk.bindAccount({
      userId: 'user-001',
      nickname: '测试用户',
      avatar: '',
      token: 'mock-token-123456'
    });

    logEvent('🚀 SDK Demo 初始化完成');
  </script>
</body>
</html>
